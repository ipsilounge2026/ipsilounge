# ─── P0: 출시 전 필수 ───────────────────────────────────────────────
items:

  - id: HSGAP-P0-fcm-push-activation
    requirement: |
      FCM 푸시 알림 활성화
      - 상담 확정 (counselor 가 예약 confirmed 처리 시)
      - 리포트 준비 완료 (QA 통과 후 상담사 검토 완료 시)
      - 만족도 설문 발송 (상담 completed 트리거)
      총 3개 트리거에서 학생에게 푸시 발송.
    spec_ref: "고등학교 상담시스템_기획서_V3.md § 7-1 (알림 메뉴) + § 10 (만족도 자동 발송)"
    priority: P0
    target_systems: [mobile]
    current_status: partial
    current_evidence: |
      [2026-04-16 보완] 코드 인프라 전 구간 완료, 런타임 활성화는 google-services.json 배치 후 kEnableFirebase 플래그 flip 만 남음.
      - mobile/pubspec.yaml L29~33: firebase_core ^3.1.0 + firebase_messaging ^15.0.3 의존성 활성.
      - mobile/lib/main.dart: _firebaseMessagingBackgroundHandler(top-level) + _initFirebase(requestPermission + onMessage 로컬알림 표시 + onMessageOpenedApp 라우팅 훅) 구현.
      - mobile/lib/screens/home_screen.dart: initState → _initFCM() 호출, FirebaseMessaging.getToken() → AuthService.saveFcmToken() 자동 호출 + onTokenRefresh 리스너.
      - backend/app/services/notification_service.py: send_satisfaction_survey_notification + send_report_ready_notification 추가.
      - backend/app/routers/admin_consultation.py L524+L579~: 만족도 설문 생성 시 FCM 푸시 동시 발송.
      - backend/app/routers/admin_consultation_survey.py L194~212: computed 엔드포인트에서 analysis_status pending→pass/repaired 최초 전환 시 "리포트 준비 완료" 푸시.
      - 3개 트리거 전부 서버측 발송 코드 존재:
        1) send_booking_confirmed_notification — admin_consultation.py L457 (기존)
        2) send_report_ready_notification      — admin_consultation_survey.py 신규
        3) send_satisfaction_survey_notification — admin_consultation.py 신규
      → partial 이유: kEnableFirebase = false (main.dart) 기본값 + google-services.json 미배포. 실제 디바이스 수신은 Firebase 콘솔 설정 후.
    fix_target:
      - "(완료) pubspec.yaml: firebase_core + firebase_messaging 의존성 주석 해제"
      - "(완료) main.dart _initFirebase() 복구: onBackgroundMessage, requestPermission, onMessage, onMessageOpenedApp 핸들러"
      - "(완료) home_screen initState → FirebaseMessaging.instance.getToken() → PUT /users/me/fcm-token 자동 호출 + onTokenRefresh"
      - "(완료) backend notification_service.py 3개 트리거 발송 함수 + 호출 지점 연결"
      - "(남은 작업) Firebase 콘솔에서 Android 앱 등록 → google-services.json 다운로드 → mobile/android/app/ 배치"
      - "(남은 작업) android/build.gradle + android/app/build.gradle 에 google-services 플러그인 적용"
      - "(남은 작업) main.dart 의 kEnableFirebase = true 로 flip"
      - "iOS (향후): APNs 인증서 설정 + Info.plist 권한 항목"
    work_size: 중
    blocker_for: ["출시 (Phase 6 배포)"]
    resolved_at: null
    linked_pr: null

  - id: HSGAP-P0-report-viewer-blocked-ui
    requirement: |
      리포트 뷰어 qa_status=blocked 상태 잠금 UI
      - consultation/page.tsx 에는 이미 analysis_blocked 배너 있음(L583~597)
      - 그러나 report/[id]/page.tsx 본체에는 qa_status 기반 잠금 분기 없음
      - 학생이 URL 직접 진입 시 blocked 상태 투명 노출 위험
    spec_ref: "고등학교 상담시스템_기획서_V3.md § 4-8-1 (분석 화면 전체 잠금 + 점검 안내)"
    priority: P0
    target_systems: [user_web]
    current_status: pass
    current_evidence: |
      [2026-04-16 구현 완료]
      - backend/app/schemas/consultation_survey.py SurveyResponse 에 analysis_status / analysis_validation 필드 추가.
      - user-web report/[id]/page.tsx L214~217: analysisStatus === 'blocked' 조기 분기 추가 (survey.analysis_status 참조).
      - BlockedReportScreen 컴포넌트 신설 (report/[id]/page.tsx): consultation/page.tsx L582~600 의 배너 패턴(#FEF2F2/#FECACA) 재사용 + 본문 전체 마스킹(점선 placeholder) + 문의 경로 안내.
      - 문구: "사전질문 자동 분석에 시스템 오류가 발견되어 점검 중입니다. 복구 즉시 안내드립니다." (기획서 § 4-8-1 원문).
    fix_target:
      - "(완료) report/[id]/page.tsx 상단에 survey.analysis_status === 'blocked' 분기 추가"
      - "(완료) blocked 시 본문 전체 마스킹 + consultation/page.tsx 배너 패턴 재사용"
      - "(완료) 기획서 § 4-8-1 원문 문구 반영"
      - "(완료) 문의 경로 안내: 입시라운지 고객센터 / 담당 상담사"
      - "(완료) backend SurveyResponse 스키마에 analysis_status 노출"
    work_size: 소
    blocker_for: ["출시 (실제 blocked 상태 학생 노출 시 UX 장애)"]
    resolved_at: "2026-04-16"
    linked_pr: null

# ─── P1: 운영 안정화 ───────────────────────────────────────────────

  - id: HSGAP-P1-super-admin-qa-issue-queue
    requirement: |
      슈퍼관리자 QA 이슈 큐 전용 페이지
      - /admin/super-admin/issues (또는 유사 경로)
      - blocked/repaired 설문 목록 + 영향 받는 상담 예약 (학생·일시·담당 상담사)
      - 이슈 상세 (P1/P2/P3 분류, 필드명, before/after)
      - 해당 필드로 점프 링크
      - 수정 후 재배포 → 다음 조회 시 자동 재검증 → 통과 시 잠금 자동 해제
    spec_ref: "고등학교 상담시스템_기획서_V3.md § 4-8-1 (슈퍼관리자 알림 + 디버깅)"
    priority: P1
    target_systems: [admin_web]
    current_status: pass
    current_evidence: |
      [2026-04-16 구현 완료]
      - backend/app/routers/admin_consultation_survey.py:
          * GET /api/admin/surveys 쿼리에 analysis_status 필터 추가 (쉼표 구분 다중값)
          * GET /api/admin/surveys/qa-issues 신설 (super_admin 전용 403 가드) — blocked/repaired/warn 설문 + 영향 받는 예약(booking + slot + counselor) + P1/P2/P3 분류 + repair_log 반환
          * POST /api/admin/surveys/{id}/revalidate 신설 — 수동 재검증 후 pass/repaired 전환 시 기존 send_report_ready_notification 재사용하여 학생 푸시 발송
      - admin-web/src/lib/api.ts: getQAIssueQueue + revalidateSurvey 래퍼 추가
      - admin-web/src/app/super-admin/issues/page.tsx 신설 (≈300줄):
          * 요약 카드(전체/blocked/repaired/warn)
          * 상태 필터 select + 새로고침
          * 카드별 P1/P2/P3 이슈 상세 펼침 + 자동 보정 로그 JSON + 영향 예약 테이블
          * "재검증" 버튼(수동 트리거) + "설문 열기"(설문 상세 링크)
      - admin-web/src/components/Sidebar.tsx: FiAlertTriangle 아이콘 + super_admin 전용 메뉴 "QA 이슈 큐" 추가, superAdminOnly 플래그 기반 visibility 필터.
    fix_target:
      - "(완료) admin-web/src/app/super-admin/issues/page.tsx 신설"
      - "(완료) GET /api/admin/surveys/qa-issues 엔드포인트 + analysis_status 필터"
      - "(완료) 영향 받는 상담 예약 조인 쿼리 (booking + slot + counselor)"
      - "(완료) 이슈 상세 펼침 영역 + 설문 상세 링크"
      - "(완료) Sidebar 메뉴에 super_admin 권한 가드로 추가"
      - "(완료) 재검증 후 pass/repaired 전환 시 send_report_ready_notification 훅 재사용"
    work_size: 중
    resolved_at: "2026-04-16"
    linked_pr: null

  - id: HSGAP-P1-lead-time-booking-ui
    requirement: |
      학습상담 7일 리드타임 예약 UI
      - 사전질문 submitted_at + 7일 이전 슬롯은 비활성/숨김
      - 선택 시도 시 거부 + 명확한 안내 메시지
      - 사전질문 미제출 상태에서는 학습상담 예약 자체 불가 (기존 규칙 유지)
    spec_ref: "고등학교 상담시스템_기획서_V3.md § 4-8-2 (학습상담 예약 리드타임)"
    priority: P1
    target_systems: [admin_web, user_web]
    current_status: pass
    current_evidence: |
      [2026-04-16 구현 완료]
      - backend/app/schemas/consultation.py: AvailableSlotResponse 에 `available: bool` +
        `unavailable_reason: str | None` 필드 추가.
      - backend/app/routers/consultation.py:
          * _compute_slot_availability 헬퍼 신설 — 기존 _check_lead_time 동일 규칙을
            에러 raise 없이 계산하여 UI 가드용 결과 반환 (학생부분석/학종전략/학습상담/선배상담 전부 커버)
          * GET /api/consultation/slots 가 consultation_type + owner_user_id 쿼리 파라미터 + get_current_user 의존성 수용.
          * 슬롯별로 available/unavailable_reason 마킹하여 반환.
      - user-web/src/lib/api.ts: getAvailableSlots(consultationType, ownerUserId) 시그니처 확장.
      - user-web/src/app/consultation/page.tsx:
          * Slot 인터페이스에 available/unavailable_reason 필드 추가
          * 타입 · 자녀 선택 변경 시 슬롯 재조회
          * 리드타임 이전 슬롯은 회색 opacity 0.45 + cursor not-allowed + title 툴팁 + "예약 불가" 라벨
          * 상단 주황 배너로 unavailable_reason 요약 노출
      - admin-web/src/app/consultation/page.tsx: 수동 예약 모달에서 학습상담/학생부분석/학종전략 선택 시
        7일 리드타임 안내문구를 표시 (관리자 직접 예약은 리드타임 bypass 가능하다는 점 병기).
    fix_target:
      - "(완료) GET /api/consultation/slots 응답에 available + unavailable_reason 필드 추가"
      - "(완료) user-web 슬롯 버튼 비활성 처리 + 배너 + 툴팁"
      - "(완료) admin-web consultation/page.tsx 수동 예약 모달 안내 문구"
      - "(완료) 사전질문 미제출 상태에서는 기존 _check_lead_time 규칙이 동일하게 가드"
      - "(완료) 선배상담 매칭 누락 케이스까지 available=false 로 UI 가드"
    work_size: 소
    resolved_at: "2026-04-16"
    linked_pr: null

  - id: HSGAP-P1-pdf-report-missing-sections
    requirement: |
      PDF 리포트에 아래 4개 섹션 추가:
      1. Phase × 4트랙 로드맵 (내신/모의/학습/진로 추천 전략)
