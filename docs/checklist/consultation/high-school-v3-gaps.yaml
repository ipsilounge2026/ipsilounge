    priority: P1
    target_systems: [backend]
    current_status: pass
    current_evidence: |
      [2026-04-16 구현 완료]
      - backend/app/services/survey_report_service.py:
          * generate_survey_report_pdf() 시그니처에 `extras: dict | None = None` 추가
          * computed["roadmap"] 존재 시 _render_roadmap 호출 (Phase × 4트랙 Platypus 테이블 +
            Phase 제목/테마/셀 텍스트, 우선순위 '상' 항목 별도 리스트)
          * extras["course_requirement_match"] 존재 시 _render_course_requirement 호출
            (대학·학과별 핵심/권장 이수·미이수 테이블, 핵심 미이수 시 경고 문구)
          * extras["suneung_minimum"] 존재 시 _render_suneung_minimum 호출
            (학생 최신 모의고사 등급, 요약 통계, 대학·전형별 충족/근접/미충족/해당없음/참조 판정 테이블,
             결과별 색상 구분)
          * extras["delta_change"].has_previous=True 시 _render_delta_change 호출
            (이전 설문 제출일, summary 요약, 카테고리별 이전→현재 값 + 변경 유형 색상 테이블)
      - backend/app/routers/admin_consultation_survey.py:
