# 이 파일은 "검증 통과 증빙" 체크리스트가 아니라 **구현 todo 추적** 파일입니다.
# 기존 *.yaml 들과 달리 status 필드는 모두 `fail` 또는 `partial` 로 시작하며,
# 보완 작업이 완료되면 `pass` 로 승격 + evidence 필드 채움 + _runs/ 에 result JSON 기록.
#
# 감사 기준:
#   - ipsilounge/고등학교 상담시스템_기획서_V3.md (1787 lines)
#   - 2026-04-16 병렬 감사(backend/user-web/admin-web/mobile 4개 타겟)
#     결과, 총 77개 요구사항 중 64 pass + 9 gap + 4 해석차이로 판정.
#   - 9 gap 중 "설문 불변 락"은 사용자 확인 후 gap 아님으로 재분류
#     (사전 설문은 수정 가능해야 한다는 정책 확정).
#   - 최종 추적 대상 8건.
#
# 관련 기존 체크리스트 (이미 ready):
#   - survey/high.yaml (설문 스키마 36항목)
#   - consultation/booking.yaml (예약 흐름 15항목)
#   - consultation/satisfaction.yaml (만족도 13항목)
#   - cross-cutting/ux-policy.yaml (자동저장/무기명/재시도 20항목)
#   → 이 4개 체크리스트가 커버하지 않는 기획서 V3 요구사항 8건을 본 파일에서 추적.
# ===================================================================

