  aspect: display
  requirement: |
    booking 단계 진입 시 상담자 목록 렌더.
    getCounselors() API → 이름/아바타 목록. 클릭 → 선택.
    담당 1명 배정 시 자동 선택.
  spec_ref:
    file: ipsilounge/CLAUDE.md
    section: "§2 상담 예약 — 상담자 선택"
