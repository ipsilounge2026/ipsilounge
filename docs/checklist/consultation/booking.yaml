    L3:
      evidence: 'preview_mcp run 2026-04-16, result: _runs/booking_20260416T120000Z.result.json'
  mobile:
    status: unverified
  admin_web:
    status: na

- id: BOOKING-B3-counselor_change
  aspect: interaction
  requirement: |
    선택된 상담자 배지 표시(이름+아바타).
    담당배정 시 "담당 상담자" 라벨, 선배상담 시 "매칭된 선배" 라벨.
    비배정 시 "변경" 버튼으로 다른 상담자 선택 가능.
