# ═══════════════════════════════════════════════════════════════════
# A. 상담 유형 선택 (3 items)
# ═══════════════════════════════════════════════════════════════════
items:
- id: BOOKING-A1-type_selector
  aspect: navigation
  requirement: |
    /consultation 진입 시 상담 유형 선택 화면 렌더.
    6종 카드: 학생부분석/학종전략/학습상담/심리상담/기타/선배상담.
    각 카드에 label + description 표시.
  spec_ref:
    file: ipsilounge/CLAUDE.md
    section: "§2 상담 예약 — 예약 흐름"
  priority: P0
  check_method: preview_mcp
  behavior_test:
  - /consultation 페이지 로드
  - 6개 상담 유형 카드 렌더 확인
  - 각 카드 label/description 텍스트 확인
  backend:
    status: na
  user_web:
    status: pass
    verified_at: '2026-04-16'
    L3:
      evidence: 'preview_mcp run 2026-04-16, result: _runs/booking_20260416T120000Z.result.json'
  mobile:
    status: unverified
  admin_web:
    status: na

- id: BOOKING-A2-eligibility_gate
  aspect: validation
  requirement: |
    학생부분석/학종전략 선택 시 자격 확인 API 호출.
    미자격 → "예약 조건" 안내 + 학생부 업로드/라운지 신청 유도 버튼.
    자격 충족 → booking 단계로 전환.
  spec_ref:
    file: ipsilounge/CLAUDE.md
    section: "§2 상담 예약 — 예약 흐름 (requiresUpload)"
  priority: P0
  check_method: preview_mcp
  behavior_test:
  - 학생부분석 클릭 → 자격 확인 중 로딩 표시
  - 미자격 시 🔒 아이콘 + 이유 + 안내 버튼
  - 자격 충족 시 booking 단계 전환
  backend:
    status: na
  user_web:
    status: pass
    verified_at: '2026-04-16'
    L3:
      evidence: 'preview_mcp run 2026-04-16, result: _runs/booking_20260416T120000Z.result.json'
  mobile:
    status: unverified
  admin_web:
    status: na

- id: BOOKING-A3-survey_gate
  aspect: navigation
  requirement: |
    학습상담 선택 시 사전 조사 상태 확인.
    3 분기: none(미작성→설문 선택), draft(미완료→이어쓰기), submitted(완료→예약 진행).
    preheigh1/high 두 설문 모두 체크.
  spec_ref:
    file: ipsilounge/CLAUDE.md
    section: "§2 상담 예약 — 학습상담 사전 조사"
  priority: P0
  check_method: preview_mcp
  behavior_test:
  - 학습상담 클릭 → 사전 조사 상태 확인 중 로딩
  - none → 예비고1/고등학생 설문 선택 카드
  - draft → 이어쓰기 버튼
  - submitted → ✅ + 예약 진행하기 버튼
  backend:
    status: na
  user_web:
    status: pass
    verified_at: '2026-04-16'
    L3:
      evidence: 'preview_mcp run 2026-04-16, result: _runs/booking_20260416T120000Z.result.json'
  mobile:
    status: unverified
  admin_web:
    status: na

