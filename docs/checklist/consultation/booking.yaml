- id: BOOKING-B2-senior_list
  aspect: display
  requirement: |
    선배상담 유형 시 getSeniors() → 매칭된 선배 목록.
    매칭 미완료 → 자격미달 안내("학원에서 먼저 선배를 매칭해드린 후 예약 가능").
    매칭 1명 → 자동 선택.
  spec_ref:
