# ─── A. 파일 상단 메타 정보 ────────────────────────────────────────
items:
  - id: ENTRY-A1-shebang-encoding
    requirement: |
      generate_report.py 상단
      - # -*- coding: utf-8 -*- 선언 (L1)
      - docstring 에 사용법·예시 명시
    spec_ref: "analyzer/generate_report.py L1~14"
    priority: P2

  - id: ENTRY-A2-path-constants
    requirement: |
      PROJECT_ROOT / STUDENTS_DIR / OUTPUT_DIR 경로 상수
      - Path(__file__).resolve().parent 기반 (상대 경로 의존 없음)
      - 폴더 통째로 이동해도 안전
    spec_ref: "analyzer/generate_report.py L21~23"
    priority: P0

  - id: ENTRY-A3-required-vars
    requirement: |
      REQUIRED_VARS 리스트 — 17개 필수 변수 명시 (2026-04-17 기준)
      - STUDENT / SCHOOL / TODAY (메타 3)
      - TARGET_UNIV / TARGET_MAJOR (지원 대학·학과, 빈 문자열이면 미지정 모드)
      - setuek_data / setuek_comments / comment_keys / good_sentences (세특 4)
      - changche_data / changche_comments (창체 2)
      - haengtuk_data / haengtuk_comments (행특 2)
      - linkage_data / eval_data / fix_data / summary_data (종합 4)
      - _template.py 변수 목록과 1:1 일치

      OPTIONAL_VARS 5개 (없어도 동작, 있으면 해당 시트·섹션 자동 추가):
      - raw_texts        — G5 키워드분석·워드클라우드
      - attendance_data  — G7 출결
      - volunteer_data   — G7 봉사
      - compare_data     — G3+G4 이전 분석 대비 변화
      - highlight_quotes — G6 v2 강점·보완점 근거 하이라이트 (2026-04-19 추가)
    spec_ref: "analyzer/generate_report.py L25~39 · data/students/_template.py"
    priority: P0

# ─── B. CLI 인자 처리 ──────────────────────────────────────────────
  - id: ENTRY-B1-no-args
    requirement: |
      인자 없이 실행 시 사용법 + 학생 목록 출력 후 exit 1
      - list_available_students() 호출
      - print_usage_with_students() 로 안내
      - sys.exit(1)
    spec_ref: "analyzer/generate_report.py L113~116, L46~59"
    priority: P1

  - id: ENTRY-B2-invalid-student
    requirement: |
      존재하지 않는 학생명 인자 시 에러 메시지 + 목록 + exit 1
      - [ERROR] 학생 데이터 파일을 찾을 수 없습니다
      - 사용 가능한 학생 목록 재출력
      - sys.exit(1)
    spec_ref: "analyzer/generate_report.py L68~80"
    priority: P1

  - id: ENTRY-B3-list-filters
    requirement: |
      list_available_students() — _template, __init__ 제외
      - 파일명 앞글자 _ 또는 __init__ 스킵
      - 정렬된 결과 반환
    spec_ref: "analyzer/generate_report.py L34~43"
    priority: P1

# ─── C. 학생 데이터 동적 로드 ──────────────────────────────────────
  - id: ENTRY-C1-korean-filename
    requirement: |
      한글 파일명 안전 로드
      - importlib.util.spec_from_file_location 사용
      - ASCII 모듈명으로 매핑 (f"student_data_{abs(hash(...))}")
      - 한글 경로도 Windows · Linux 양쪽에서 안정
    spec_ref: "analyzer/generate_report.py L83~90"
    priority: P0

  - id: ENTRY-C2-load-exception-handling
    requirement: |
      spec.loader.exec_module 예외 캐치
      - 학생 데이터 파일에 문법 오류 · import 오류 있을 때
      - [ERROR] 데이터 파일 실행 중 오류 메시지 + 예외 타입·메시지
      - sys.exit(2)
    spec_ref: "analyzer/generate_report.py L91~97"
    priority: P1

  - id: ENTRY-C3-required-vars-check
    requirement: |
      로드된 모듈에 15개 필수 변수 존재 여부 검증
      - hasattr() 로 확인
      - 누락 시 각 변수 나열 + _template.py 참조 안내 + exit 2
    spec_ref: "analyzer/generate_report.py L100~107"
    priority: P0

# ─── D. QA 검증 연동 ───────────────────────────────────────────────
  - id: ENTRY-D1-qa-import
    requirement: |
      Step 8.5 QA 검증 연동
      - modules.qa_validator.run_full_qa 호출
      - print_qa_report 로 결과 출력
      - 동적 import (sys.path 설정 후)
    spec_ref: "analyzer/generate_report.py L127~144"
    priority: P0

  - id: ENTRY-D2-qa-block-on-fail
    requirement: |
      QA all_blocking_passed() 실패 시 리포트 생성 차단
      - "QA FAIL - 리포트 생성 차단. FAIL 항목 수정 후 재실행하세요." 메시지
      - sys.exit(3)
      - CLAUDE.md § Step 9 "QA P1 전체 통과 시에만 Step 9 진행" 원칙
    spec_ref: "analyzer/generate_report.py L146~148 · analyzer/CLAUDE.md § Step 9"
    priority: P0

  - id: ENTRY-D3-qa-required-args
    requirement: |
      run_full_qa 에 전달되는 인자 누락 없음
      - setuek_data/setuek_comments/good_sentences/
        changche_data/haengtuk_data/haengtuk_comments/
        linkage_data/fix_data/student_name
      - 학생 모듈에서 모두 전달
    spec_ref: "analyzer/generate_report.py L133~143"
    priority: P0

# ─── E. 리포트 생성 호출 ────────────────────────────────────────────
  - id: ENTRY-E1-output-dir
    requirement: |
      OUTPUT_DIR 자동 생성 (mkdir parents=True, exist_ok=True)
      - 최초 실행 시 output/ 폴더 없어도 자동 생성
      - 기존 파일 덮어쓰기 허용
    spec_ref: "analyzer/generate_report.py L153"
    priority: P1

  - id: ENTRY-E2-path-naming
    requirement: |
      출력 파일명 규칙 준수
      - xlsx: {STUDENT}_학생부분석_{TODAY}.xlsx
      - pdf:  {STUDENT}_학생부분석_{TODAY}.pdf
      - CLAUDE.md § 9-2 파일명 규칙과 일치
    spec_ref: "analyzer/generate_report.py L154~155 · analyzer/CLAUDE.md § 9-2"
    priority: P1

  - id: ENTRY-E3-create-excel-pdf
    requirement: |
      modules.report_logic.create_excel + create_pdf 호출
      - 순서: Excel → PDF
      - 양쪽 다 학생 데이터(sd) + 출력 경로 전달
      - 성공 시 "Done." 출력
    spec_ref: "analyzer/generate_report.py L157~160"
    priority: P0

# ─── F. 2회차 이상 분석 지원 (CLAUDE.md § 0-4) ──────────────────────
  - id: ENTRY-F1-version-suffix
    requirement: |
      2회차 이상 분석 시 파일명에 _v{N} 접미사 (2026-04-17 eb687e9 구현 완료)
      - 예: 연승훈_학생부분석_20260407_v2.xlsx
      - CLAUDE.md § 0-4 "이전 분석 대비 변화" 섹션 추가 시 반영
      - modules/compare_generator.get_next_version_number() 가 output/ 폴더 스캔 후
        다음 버전 번호 자동 산출
      - compare_data 비어있는데 이전 리포트 있으면 경고 안내
    spec_ref: "analyzer/generate_report.py L203~220 · modules/compare_generator.py"
    priority: P1

# ─── G. 종료 코드 규약 ──────────────────────────────────────────────
  - id: ENTRY-G1-exit-codes
    requirement: |
      exit code 규약
      - 0: 정상 종료
      - 1: CLI 사용법 오류 (인자 없음 / 존재하지 않는 학생)
      - 2: 학생 데이터 파일 로드 실패 (문법 오류 / 필수 변수 누락)
      - 3: QA 검증 FAIL (리포트 생성 차단)
    spec_ref: "analyzer/generate_report.py 전체"
    priority: P1

# ─── H. 개발 편의성 ─────────────────────────────────────────────────
  - id: ENTRY-H1-drag-workflow
    requirement: |
      Claude 대화 세션에서 학생부 드래그 → 분석 → generate_report.py 실행 흐름
      - Claude 가 data/students/<학생명>.py 자동 생성
      - 개발자가 python generate_report.py <학생명> 실행
      - README.md 에 사용법 명시
    spec_ref: "analyzer/README.md § 개발 모드 사용법"
    priority: P1

  - id: ENTRY-H2-error-messages-korean
    requirement: |
      에러 메시지 한글 + 구체적 안내
      - [ERROR] 접두사
      - 해결 방법 동반 (예: "_template.py를 참고하여 모든 필수 변수를 정의하세요")
      - 파일 경로 전체 출력
    spec_ref: "analyzer/generate_report.py L69, L88, L95, L102"
    priority: P2

# ─── I. 실행 모드 옵션 (CLAUDE.md §13, 2026-04-19 A안 구현) ──────────
  - id: ENTRY-I1-mode-cli-parsing
    requirement: |
      --mode / --areas CLI 옵션 파싱
      - _parse_optional_flag(sys.argv, "--mode") → "full"(기본) / "no-grade" / "partial"
      - _parse_optional_flag(sys.argv, "--areas") → 쉼표 구분 영역 목록
      - modules/mode_config.build_mode_config(mode, areas) 로 ModeConfig 생성
      - 에러 시 ValueError 메시지 출력 + exit 1
    spec_ref: "analyzer/generate_report.py L155~172 · modules/mode_config.py"
    priority: P1

  - id: ENTRY-I2-mode-propagation
    requirement: |
      ModeConfig 3곳 전파
      - run_full_qa(..., mode_config=mode_cfg) — 영역별 QA 스킵
      - create_excel(sd, xlsx_path, mode_config=mode_cfg) — 시트 선택적 생성
      - create_pdf(sd, pdf_path, mode_config=mode_cfg) — 섹션 선택적 생성
      - 실행 모드 라벨 콘솔 출력 ("실행 모드: {full/no-grade/...}")
    spec_ref: "analyzer/generate_report.py L172, L216, L252~253"
    priority: P1

  - id: ENTRY-I3-mode-regression
    requirement: |
      모든 모드 회귀 검증 (의대샘플 기준)
      - full     → 9시트 / PDF 정상 (기본 경로)
      - no-grade → 9시트 / 내신·입결 미구현이라 NOOP 동일
      - partial --areas setuek → 7시트 (세특 3 + 교차영역 3 + 종합요약)
      - partial --areas changche,haengtuk → 6시트
      - CLI 에러 (partial 단독) → "--areas 필수" 메시지
    spec_ref: "2026-04-19 세션 회귀 테스트"
    priority: P1

# ─── J. Phase C backend 연동 (CLAUDE.md 미반영, 2026-04-17 구현) ─────
  - id: ENTRY-J1-analysis-id-flag
    requirement: |
      --analysis-id <UUID> CLI 옵션
      - backend analysis_orders.id 전달 (수동 분석 워크플로우 통합)
      - _analysis_id = _parse_optional_flag(sys.argv, "--analysis-id")
      - 미전달 시 sd.analysis_id 사용 (학생 데이터 파일 내 메타)
    spec_ref: "analyzer/generate_report.py L149~153, L233~234"
    priority: P2

  - id: ENTRY-J2-auto-upload-flag
    requirement: |
      --auto-upload CLI 옵션
      - 리포트 생성 직후 modules.analysis_fetcher.upload() 호출
      - analysis_id 우선순위: CLI 인자 > sd.analysis_id
      - 업로드 실패 시 [ERROR] + exit 4 (수동 업로드 안내)
      - 성공 시 "[OK] 업로드 완료. 관리자 검수 대기 (status=review)."
    spec_ref: "analyzer/generate_report.py L269~285 · modules/analysis_fetcher.py"
    priority: P2

# ─── K. G6 하이라이트 PDF 호출 (CLAUDE.md §9-4, 2026-04-19) ─────────
  - id: ENTRY-K1-highlight-pdf-call
    requirement: |
      리포트 생성 직후 generate_highlight_pdf() 자동 호출
      - partial 모드 setuek 미선택 시 전체 스킵 ("[INFO] ...")
      - source_pdf_path 없거나 good_sentences+highlight_quotes 모두 비면 [SKIP]
      - 예외는 WARN 로 잡아 본 리포트 파이프라인에 영향 안 줌
      - print_highlight_summary() 로 색상별 매치/전체 통계 출력
    spec_ref: "analyzer/generate_report.py L256~267 · modules/highlight_pdf_generator.py"
    priority: P1
