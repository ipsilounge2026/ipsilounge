# ===================================================================
# 학생부 분석기 의존성 체크리스트
# ===================================================================
# spec: ipsilounge/analyzer/CLAUDE.md § 기술 스택
#       ipsilounge/analyzer/requirements.txt
# 범위: Python 런타임 · 실제 사용 패키지 · 미사용 패키지 gap · 시스템 도구
# 검증 방법: pip show + 실제 import 스캔
# ===================================================================

meta:
  area_code: ANALYZER
  title: "analyzer Python 의존성"
  created_at: "2026-04-17"
  spec_refs:
    - "ipsilounge/analyzer/CLAUDE.md § 기술 스택"
    - "ipsilounge/analyzer/requirements.txt"
  implementation_notes:
    - "Pin 방식 (==) — CLI 독립 실행 프로그램이므로 버전 고정 우선"
    - "CLAUDE.md 명시 중 미사용 5개(pdf2image, kiwipiepy, wordcloud, matplotlib, pandas) 제외"
    - "pdf2image 를 쓰지 않으므로 poppler(tools/) 도 이식 제외"
    - "향후 §8-4 워드클라우드 키워드 추출 등 확장 기능 구현 시 requirements.txt 재조정"

# ─── A. Python 런타임 ──────────────────────────────────────────────
items:
  - id: DEPS-A1-python-version
    requirement: |
      Python 3.10 이상 필수
      - 실제 개발 환경: Python 3.14.3
      - f-string · Path · typing 기본 사용
    spec_ref: "개발 환경 기준"
    priority: P0

# ─── B. 실제 사용 패키지 (requirements.txt 에 반영) ──────────────────
  - id: DEPS-B1-openpyxl
    requirement: |
      openpyxl==3.1.5 — Excel 리포트 생성 (.xlsx)
      - 사용처: modules/report_logic.py, modules/report_generator.py,
        modules/grade_analyzer.py, modules/admission_matcher.py 등
      - Workbook, Font, PatternFill, Alignment, Border, Side 등 사용
    spec_ref: "analyzer/requirements.txt L14"
    priority: P0

  - id: DEPS-B2-reportlab
    requirement: |
      reportlab==4.4.10 — PDF 리포트 생성
      - 사용처: modules/report_logic.py, modules/comprehensive_analyzer.py
      - platypus, graphics, pdfbase, lib 하위 모듈 사용
      - 한글 폰트 등록 (TTFont + NanumSquareRound)
    spec_ref: "analyzer/requirements.txt L15"
    priority: P0

  - id: DEPS-B3-pyyaml
    requirement: |
      PyYAML==6.0.3 — config.yaml 파싱
      - 사용처: modules/grade_analyzer.py load_config()
      - 루브릭 가중치·등급 기준·소인수 임계값 로드
    spec_ref: "analyzer/requirements.txt L16"
    priority: P0

# ─── C. 미사용 패키지 (gap: CLAUDE.md 명시되었으나 실제 미사용) ─────
  - id: DEPS-C1-pdf2image-gap
    requirement: |
      pdf2image (CLAUDE.md 명시, 실제 코드 미사용)
      - CLAUDE.md § Step 1 "PDF → 페이지별 이미지 변환(pdf2image)" 명시
      - 실제로는 Claude가 학생부 PDF를 대화 중 이미지 분석으로 직접 처리
      - requirements.txt 에서 제외
      - gap: 향후 자동화 wrapper 연결 시 서버 측 PDF 변환 필요하면 재도입 검토
    spec_ref: "analyzer/CLAUDE.md § 기술 스택"
    priority: P2

  - id: DEPS-C2-kiwipiepy-gap
    requirement: |
      kiwipiepy (CLAUDE.md 명시, 실제 코드 미사용)
      - CLAUDE.md § 8-4 "한국어 형태소 분석 (키워드 추출용)" 명시
      - 실제 workflow 에서는 Claude가 키워드 추출 대신 수행
      - 향후 Python 자동 키워드 추출 구현 시 도입 예정
    spec_ref: "analyzer/CLAUDE.md § 8-4 워드클라우드"
    priority: P2

  - id: DEPS-C3-wordcloud-gap
    requirement: |
      wordcloud (CLAUDE.md 명시, 실제 코드 미사용)
      - CLAUDE.md § 8-4 워드클라우드 이미지 생성
      - 현재 리포트에 워드클라우드 섹션 미구현
      - §8-4 구현 시 도입
    spec_ref: "analyzer/CLAUDE.md § 8-4 워드클라우드"
    priority: P2

  - id: DEPS-C4-matplotlib-gap
    requirement: |
      matplotlib (CLAUDE.md 명시, 실제 코드 미사용)
      - 워드클라우드 렌더링 · PDF 차트 생성용
      - 현재는 reportlab graphics 로만 시각화 처리
      - §8-4 구현 시 도입
    spec_ref: "analyzer/CLAUDE.md § 기술 스택"
    priority: P2

  - id: DEPS-C5-pandas-gap
    requirement: |
      pandas (CLAUDE.md 명시, 실제 코드 미사용)
      - 실제로는 openpyxl 직접 사용으로 충분
      - 현재 분석 로직이 단순 dict 기반이라 pandas 불필요
      - 향후 통계 분석 확장 시 도입 검토
    spec_ref: "analyzer/CLAUDE.md § 기술 스택"
    priority: P3

# ─── D. 시스템 도구 (Python 패키지 아님) ────────────────────────────
  - id: DEPS-D1-poppler-excluded
    requirement: |
      poppler — PDF → 이미지 변환 바이너리
      - pdf2image 가 내부 호출 시 필요
      - 실제 코드에서 pdf2image 미사용이므로 poppler 도 불필요
      - school-record-analyzer/tools/poppler-24.08.0/ (49MB) 이식 제외
      - 향후 자동화 wrapper 도입 시 설치 스크립트 작성
    spec_ref: "analyzer/CLAUDE.md § 기술 스택 + 이식 계획서"
    priority: P2

# ─── E. 의존성 분리 관리 ────────────────────────────────────────────
  - id: DEPS-E1-separate-from-backend
    requirement: |
      analyzer/requirements.txt 는 ipsilounge/backend/requirements.txt 와 분리
      - 겹치는 패키지: openpyxl 하나 (버전 호환은 현재 문제 없음)
      - 의도: analyzer 는 독립 CLI 프로그램이므로 의존성도 분리
      - 향후 wrapper 연결 시에는 backend pyproject 에서 analyzer 를 optional extra 로 선언 가능
    spec_ref: "analyzer/requirements.txt 주석 + backend/requirements.txt"
    priority: P1

  - id: DEPS-E2-pin-rationale
    requirement: |
      Pin 방식(==) 채택 근거
      - CLI 독립 실행 프로그램 (라이브러리 아님)
      - 버전 차이로 인한 리포트 출력 재현성 이슈 방지
      - 보안 패치는 수동 업그레이드 + 회귀 테스트 후 적용
    spec_ref: "analyzer/requirements.txt 주석"
    priority: P1

# ─── F. 설치 검증 ────────────────────────────────────────────────────
  - id: DEPS-F1-install-procedure
    requirement: |
      설치 절차 문서화
      - README.md 에 `cd ipsilounge/analyzer && pip install -r requirements.txt` 명시
      - Python 3.10+ 환경 가정
    spec_ref: "analyzer/README.md § 설치"
    priority: P1

  - id: DEPS-F2-runtime-smoke
    requirement: |
      설치 후 smoke test
      - python generate_report.py 의대샘플 → xlsx+pdf 정상 생성
      - 한글 폰트 렌더 정상
      - 위 3개 pinned 패키지만 있어도 리포트 생성 완료
    spec_ref: "이식 Phase 5 검증 결과"
    priority: P0
