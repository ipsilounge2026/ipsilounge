# ─── A. Python 런타임 ──────────────────────────────────────────────
items:
  - id: DEPS-A1-python-version
    requirement: |
      Python 3.10 이상 필수
      - 실제 개발 환경: Python 3.14.3
      - f-string · Path · typing 기본 사용
    spec_ref: "개발 환경 기준"
    priority: P0

# ─── B. 실제 사용 패키지 (requirements.txt 에 반영) ──────────────────
  - id: DEPS-B1-openpyxl
    requirement: |
      openpyxl==3.1.5 — Excel 리포트 생성 (.xlsx)
      - 사용처: modules/report_logic.py, modules/report_generator.py,
        modules/grade_analyzer.py, modules/admission_matcher.py 등
      - Workbook, Font, PatternFill, Alignment, Border, Side 등 사용
    spec_ref: "analyzer/requirements.txt L14"
    priority: P0

  - id: DEPS-B2-reportlab
    requirement: |
      reportlab==4.4.10 — PDF 리포트 생성
      - 사용처: modules/report_logic.py, modules/comprehensive_analyzer.py
      - platypus, graphics, pdfbase, lib 하위 모듈 사용
      - 한글 폰트 등록 (TTFont + NanumSquareRound)
    spec_ref: "analyzer/requirements.txt L15"
    priority: P0

  - id: DEPS-B3-pyyaml
    requirement: |
      PyYAML==6.0.3 — config.yaml 파싱
      - 사용처: modules/grade_analyzer.py load_config()
      - 루브릭 가중치·등급 기준·소인수 임계값 로드
    spec_ref: "analyzer/requirements.txt L16"
    priority: P0

  - id: DEPS-B4-kiwipiepy
    requirement: |
      kiwipiepy==0.23.1 — 한국어 형태소 분석 (2026-04-17 G5 구현으로 도입)
      - 사용처: modules/keyword_extractor.py
      - CLAUDE.md § Step 8-4 키워드 추출 — 명사(NNG/NNP) 필터 + 빈도 집계
      - G5 구현 전 C2 gap 이었으나, 실제 import 반영으로 pass 승격
    spec_ref: "analyzer/requirements.txt L22 · modules/keyword_extractor.py"
    priority: P1

  - id: DEPS-B5-wordcloud
    requirement: |
      wordcloud==1.9.6 — 워드클라우드 이미지 생성 (2026-04-17 G5 구현으로 도입)
      - 사용처: modules/keyword_extractor.py generate_wordcloud_image()
      - PDF 리포트 § 키워드분석 섹션 이미지 삽입용
    spec_ref: "analyzer/requirements.txt L23 · modules/keyword_extractor.py"
    priority: P1

  - id: DEPS-B6-matplotlib
    requirement: |
      matplotlib==3.10.8 — 워드클라우드 savefig 백엔드 (2026-04-17 G5 구현으로 도입)
      - 사용처: modules/keyword_extractor.py (wordcloud 가 내부적으로 matplotlib 사용)
      - 헤드리스 환경 고려 (Agg 백엔드)
    spec_ref: "analyzer/requirements.txt L24 · modules/keyword_extractor.py"
    priority: P1

  - id: DEPS-B7-pymupdf
    requirement: |
      pymupdf==1.27.2.2 — PDF 텍스트 검색 + 주석 삽입 (2026-04-19 G6 구현으로 도입)
      - 사용처: modules/highlight_pdf_generator.py (import fitz)
      - CLAUDE.md § Step 9-4 상담용 학생부 하이라이트 PDF
      - 노랑(good_sentences) + 초록/주황(highlight_quotes) 3색 형광 + 범례 페이지
      - page.search_for() 텍스트 매칭 + add_highlight_annot() 색상별 주석
    spec_ref: "analyzer/requirements.txt L29 · modules/highlight_pdf_generator.py"
    priority: P1

