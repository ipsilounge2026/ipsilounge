# ===================================================================
# 학생부 분석 리포트 출력 구조 체크리스트
# ===================================================================
# spec: school-record-analyzer/CLAUDE.md § 리포트 출력 구조, Step 9
# 범위: Excel 리포트 시트 구성 · PDF 리포트 구조 · 파일명 규약 · spec↔구현 gap
# 검증 방법: 실제 생성된 Excel/PDF 파일 검사 (openpyxl, pypdf) + 코드 리뷰
# ===================================================================
#
# 참고: 분석 로직·루브릭은 analyzer/rubric.yaml 범위.
#       파이프라인·QA·동적로드는 analyzer/pipeline.yaml 범위.
#       이 체크리스트는 "리포트로 출력된 산출물의 구조"에 한정.
#
# 핵심 gap (spec vs 구현):
#   spec 명시 13시트 중 구현 9시트 (내신분석/입결비교/키워드분석/
#   전형적합도/출결봉사/이전분석대비변화 6시트 미구현).
#   PDF 워드클라우드 및 하이라이트 PDF(9-4) 미구현.
#   현재 운영은 "내신 제외 분석" 모드로 사용 중이므로 대부분의 미구현은
#   실사용 영향 없음. 다만 키워드분석·하이라이트 PDF는 P2 확장 과제.
# ===================================================================

meta:
  area_code: ANALYZER
  title: "학생부 분석 리포트 출력 구조 (Excel + PDF)"
  created_at: "2026-04-16"
  spec_refs:
    - "school-record-analyzer/CLAUDE.md § 리포트 출력 구조"
    - "school-record-analyzer/CLAUDE.md § Step 9 (9-0~9-5)"
    - "school-record-analyzer/CLAUDE.md § Excel 출력 규칙"
    - "school-record-analyzer/modules/report_logic.py"
    - "school-record-analyzer/modules/report_constants.py"
  implementation_notes:
    - "[2026-04-19 재검증] Excel 12시트 구현 (조건부 3 포함): 고정 9 + 키워드분석(raw_texts) + 출결·봉사(attendance/volunteer) + 이전분석대비변화(compare_data)"
    - "고정 9시트: 종합요약/세특분석/세특코멘트/핵심평가문장/창체분석/행특분석/연계성분석/대학평가요소/역량별보완법"
    - "Spec 명시 13시트 중 3시트 여전히 미구현 (내신분석/입결비교/전형적합도) — 대학 DB 선행 필요"
    - "[2026-04-17 해소] 키워드분석·출결·봉사·이전분석대비변화 3시트 + 워드클라우드 PDF 섹션"
    - "[2026-04-19 해소] 하이라이트 PDF(§9-4) G6 v1+v2 → modules/highlight_pdf_generator.py (PyMuPDF 3색)"
    - "[2026-04-19 신규] --mode/--areas CLI (A안) → partial 모드에서 세특/창체/행특 시트 선택적 생성"

# ─── A. Excel 시트 구조 (9시트 구현 검증) ────────────────────────
items:
  - id: RO-A1-excel_file_creation
    requirement: |
      create_excel(sd, xlsx_path) 실행 시 .xlsx 파일 정상 생성:
      - openpyxl Workbook 기반
      - 파일 크기 > 0, openpyxl.load_workbook() 로 다시 읽기 가능
      - 파일명: {학생이름}_학생부분석_{YYYYMMDD}.xlsx
    spec_ref: "report_logic.py create_excel() L61~278"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "연승훈_학생부분석_20260406.xlsx 29,845 bytes / 의대샘플_학생부분석_20260408.xlsx 28,671 bytes. load_workbook() 정상, 9시트 모두 읽기 가능"

  - id: RO-A2-sheet_summary
    requirement: |
      종합요약 시트:
      - 헤더 [항목, 내용]
      - 11행: 학생명/학교명/비교과종합/비교과종합점수/
        핵심강점1~3/보완영역1~3/성장스토리
      - col_widths [18, 90], auto_filter A1:B12, freeze_panes A2
    spec_ref: "report_logic.py L117~140, CLAUDE.md § 종합요약"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "12r×2c, freeze=A2, filter=A1:B12. 11행 내용 순서 일치: 학생명=연승훈, 학교명=봉양고, 비교과종합, 비교과종합점수=71.3점 A-등급, 핵심강점1~3, 보완영역1~3, 성장스토리"

  - id: RO-A3-sheet_setuek
    requirement: |
      세특분석 시트:
      - 헤더 [학년, 과목, 교과연계성, 탐구동기, 탐구과정, 결과성찰,
              차별성, 학업태도, 가중합산, 등급] (10열)
      - 각 행: setuek_data 매핑
      - 등급 셀 apply_grade_color() 적용
      - SETUEK_ITEMS는 6항목 (전공적합성 제외)
    spec_ref: "report_logic.py L142~159, CLAUDE.md § 세특분석"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "20r×10c (19과목+헤더). 헤더 10열 정확. 등급 분포: S=5/A=3/B=9/C=2. 등급 컬러 확인: S=#1F4E79, A=#2E75B6, B=#9DC3E6, C=#F4B183"
    note: "spec의 '7개 항목'은 프롬프트 기준. 구현은 6항목으로 일관됨"

  - id: RO-A4-sheet_setuek_comment
    requirement: |
      세특코멘트 시트:
      - 헤더 [학년, 과목, 강점, 보완점] (4열)
      - comment_keys 순서대로 파싱 ('과목명(학년)' 형식)
      - 강점/보완점 left_align
      - col_widths [6, 18, 70, 70]
    spec_ref: "report_logic.py L162~180, CLAUDE.md § 세특분석 코멘트"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "20r×4c. freeze=A2, filter=A1:D1. 19과목 코멘트 정상 로드. 파싱: rsplit('(',1)로 과목명/학년 분리"

  - id: RO-A5-sheet_good_sentence
    requirement: |
      핵심평가문장 시트:
      - 헤더 [과목, 핵심문장, 이유, 표현역량] (4열)
      - good_sentences 4-tuple 매핑
      - 핵심문장/이유/표현역량 left_align
      - col_widths [16, 60, 55, 40]
    spec_ref: "report_logic.py L183~193, CLAUDE.md § 좋은 평가 문장 추출"
    priority: P1
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "26r×4c (25개 핵심문장+헤더). 4-tuple 구조 정상 매핑"

  - id: RO-A6-sheet_changche
    requirement: |
      창체분석 시트:
      - 헤더 [학년, 영역, 시간, 항목5개, 합계(/50), 환산(100),
              등급, 분량, 비율, 활용] (14열)
      - 등급은 score_to_grade(scaled/10)로 계산
      - 분량/비율/활용 문자열 표기 ("480/500자", "96%", "충실활용")
      - 등급 셀 apply_grade_color() 적용
    spec_ref: "report_logic.py L195~219, CLAUDE.md § 창체분석"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "10r×14c. row2 확인: [1,'자율',82,9,8,7,7,5,'36/50',72,'A','480/500','96%','충실활용']. 분량/비율/활용 문자열 정확"

  - id: RO-A7-sheet_haengtuk
    requirement: |
      행특분석 시트:
      - 헤더 [학년, 강점, 보완점] (3열)
      - haengtuk_comments 딕셔너리 키 정렬 순회
      - 강점/보완점 left_align
      - col_widths [6, 75, 75]
    spec_ref: "report_logic.py L221~234, CLAUDE.md § 행특분석"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "4r×3c (3학년+헤더). 학년별 sorted 순회 확인"
    note: "spec은 '5항목 점수 + 학년/강점/보완점 3항목' 병행. 구현은 코멘트 중심 3열 (점수 테이블 없음, 설계 의도)"

  - id: RO-A8-sheet_linkage
    requirement: |
      연계성분석 시트:
      - 헤더 [분석영역, 연계도, 상세내용] (3열)
      - linkage_data 3-tuple 매핑
      - 상세내용 left_align
      - col_widths [18, 10, 90]
    spec_ref: "report_logic.py L236~246, CLAUDE.md § 연계성분석"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "4r×3c (3분석영역+헤더). freeze=A2, filter=A1:C1"

  - id: RO-A9-sheet_eval
    requirement: |
      대학평가요소 시트:
      - 헤더 [대분류, 세부항목, 등급, 근거] (4열)
      - eval_data 4-tuple: 학업/진로/공동체 역량별 재분류
      - 등급 셀 apply_grade_color() 적용
      - 근거 left_align
    spec_ref: "report_logic.py L248~260, CLAUDE.md § 대학평가요소"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "11r×4c (10세부항목+헤더). 학업역량 3 + 진로역량 3 + 공동체역량 4 = 10항목 정확"

  - id: RO-A10-sheet_fix
    requirement: |
      역량별보완법 시트:
      - 헤더 [역량, 항목, 현재등급, 진단, 보완활동, 중요도] (6열)
      - fix_data 6-tuple 매핑
      - 진단/보완활동 left_align (300자↑)
      - col_widths [10, 14, 10, 30, 80, 8]
    spec_ref: "report_logic.py L262~275, CLAUDE.md § 역량별보완법"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "5r×6c (4보완항목+헤더). 6-tuple 구조 완전"

  # ─── B. Excel 스타일 규칙 ──────────────────────────────────────
  - id: RO-B1-header_style
    requirement: |
      Excel 헤더 스타일 일관성:
      - 배경색 #4472C4 (HEADER_FILL_HEX)
      - Arial bold, 흰색 글자, size 10
      - 모든 시트 헤더에 동일 적용
    spec_ref: "report_logic.py L86~87, CLAUDE.md § Excel 출력 규칙"
    priority: P1
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "세특분석 헤더 확인: fill=004472C4, font=Arial bold, color=00FFFFFF, size=10. 모든 시트 동일 적용"

  - id: RO-B2-filter_freeze
    requirement: |
      Excel UX 설정:
      - 모든 시트 auto_filter.ref 설정
      - 모든 시트 freeze_panes = "A2" (첫 행 고정)
      - thin borders 전체 셀
    spec_ref: "report_logic.py L82~88, style_cell()"
    priority: P1
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "9시트 모두 freeze_panes=A2, auto_filter.ref 설정 확인. thin Side(style='thin') border 전체 셀 적용"

  - id: RO-B3-no_merge_wrap
    requirement: |
      태블릿 MS365 호환성:
      - merge_cells 사용 금지 (모든 시트에서 0건)
      - wrap_text 사용 금지 (grep 0건)
    spec_ref: "CLAUDE.md § Excel 출력 규칙"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "9시트 검사: merged_cells.ranges 모두 0건. wrap_text cells 모두 0건. 태블릿 호환성 완전 준수"

  - id: RO-B4-grade_color
    requirement: |
      등급별 배경색 + 글자색:
      - S: bg #1F4E79, fg #FFFFFF
      - A: bg #2E75B6, fg #FFFFFF
      - B: bg #9DC3E6, fg #000000
      - C: bg #F4B183, fg #000000
      - D: bg #FF0000, fg #FFFFFF
      - apply_grade_color() 함수로 세특/창체/평가요소 시트에 적용
    spec_ref: "report_logic.py L46~54, L107~111"
    priority: P1
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "세특분석 등급 셀: S=001F4E79, A=002E75B6, B=009DC3E6, C=00F4B183 전부 일치. 창체/평가요소 시트도 동일 패턴"

  # ─── C. PDF 구조 (표지 + 인트로 + 7개 섹션) ────────────────────
  - id: RO-C1-pdf_file_creation
    requirement: |
      create_pdf(sd, pdf_path) 실행 시 .pdf 파일 정상 생성:
      - reportlab SimpleDocTemplate + A4
      - margins: left/right 10mm, top 12mm, bottom 12mm
      - 파일 크기 > 100KB (정상 렌더 기준)
    spec_ref: "report_logic.py L285~332"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "연승훈 PDF 242,771 bytes / 의대샘플 PDF 238,724 bytes. pypdf 읽기 성공. 연승훈 기준 17페이지"

  - id: RO-C2-cover_page
    requirement: |
      표지 페이지 (CoverPage Flowable):
      - 로고 (왼쪽 상단, 높이 54pt)
      - 메인 타이틀 "학생부라운지" (MalgunBd 43pt, #1E3A5F)
      - 하단 정보 박스: 학생명 + 학교명 + 학년범위 + 분석일
      - 학년범위: _calc_record_range() 자동 생성 (1학년/1~2학년/1~3학년)
    spec_ref: "report_logic.py L538~614, CLAUDE.md § 9-3 표지"
    priority: P1
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "p1 text='학생부라운지' 포함. CoverPage Flowable에서 로고+제목+정보박스 그리기. 의대샘플(2학년)은 '1~2학년' 자동 생성"

  - id: RO-C3-toc_page
    requirement: |
      목차 페이지:
      - 타이틀 "목차" (MalgunBd 22pt)
      - 7개 메인 섹션 (1~7)
      - 3개 서브 섹션 (2-1/2-2/2-3, 3-1/3-2/3-3)
      - 메인/서브 들여쓰기 구분
    spec_ref: "report_logic.py L618~649"
    priority: P2
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "'목차' 텍스트 PDF 포함 확인. toc_items 리스트: 7 메인 + 6 서브(2-1/2-2/2-3/3-1/3-2/3-3)"

  - id: RO-C4-guide_page
    requirement: |
      평가 기준 안내 페이지:
      - 1) 세특 평가 항목 (교과연계성/탐구동기/탐구과정/결과성찰/차별성/학업태도)
      - 2) 창체 평가 항목 (자율/동아리/진로 각 5항목)
      - 3) 행특 평가 항목 (5항목)
      - 4) 등급 기준 (S~D, 1~10점 척도)
      - 5) 핵심역량 분류 (학업/진로/공동체)
    spec_ref: "report_logic.py L652~799"
    priority: P2
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "'평가 기준 안내' 텍스트 PDF 포함. 5개 테이블 순차 생성 (guide_setuek/guide_changche/guide_haengtuk/guide_grades/guide_comp)"

  - id: RO-C5-section_1_summary
    requirement: |
      1. 종합의견:
      - 11행 종합 테이블 (항목/내용)
      - 2×2 bar chart: 세특/창체/행특/비교과종합 + 등급 (Admiral Slate 컬러)
      - comp_total = (setuek×0.30 + changche×0.25 + haengtuk×0.10) / 0.65
      - 종합 코멘트 박스 (좌측 #0E2841 막대 + 회색 배경 #F8F9FA)
      - _grade_100()으로 S+/S/S- 세분화 등급 적용
    spec_ref: "report_logic.py L810~937"
    priority: P0
    file_inspection:
      status: pass
      verified_at: "2026-04-16"
      evidence: "'1. 종합의견', '종합 코멘트' 텍스트 PDF 포함. 4개 bar_items (세특/창체/행특/비교과종합). 연승훈 비교과종합=71.3 A-등급 렌더"

  - id: RO-C6-section_2_setuek
    requirement: |
