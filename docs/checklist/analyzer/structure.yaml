# ─── H. 격리 (ipsilounge 본체와의 경계) ─────────────────────────────
  - id: STRUCT-H1-no-import-from-backend
    requirement: |
      ipsilounge 본체 코드가 analyzer 를 직접 import 하지 않음
      - grep -r "from analyzer" ipsilounge/backend → 0건
      - grep -r "import analyzer" ipsilounge/backend → 0건
      - admin-web / user-web / mobile 에서도 참조 없음
      - 접점은 향후 backend/app/services/analyzer_service.py wrapper 1곳 한정
    spec_ref: "ipsilounge/CLAUDE.md § 관련 인프라: analyzer 통합"
    priority: P0

  - id: STRUCT-H2-shared-data-root
    requirement: |
      SHARED_DATA_ROOT 는 analyzer/data 를 단일 원천으로 참조
      - backend/app/config.py _DEFAULT_DATA_ROOT = parents[2] / "analyzer" / "data"
      - settings.DATA_ROOT property 로 일관된 접근
      - 환경변수 SHARED_DATA_ROOT 로 운영 오버라이드 가능
    spec_ref: "ipsilounge/backend/app/config.py L10~12, L78~84"
    priority: P0
