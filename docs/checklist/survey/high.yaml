    tool: preview_eval
    expression: "(() => {\n  const card = Array.from(document.querySelectorAll('div'))\n\
      \    .find(d => d.textContent?.startsWith('T1 (') && d.style?.cursor === 'pointer');\n\
      \  if (!card) return { error: 'T1 card not found' };\n  card.click();\n  return\
      \ { clicked: true };\n})()\n"
    assert: result.clicked === true
  - step: click_start_survey
    tool: preview_eval
    expression: "(() => {\n  const btn = Array.from(document.querySelectorAll('button'))\n\
      \    .find(b => b.textContent?.trim() === '설문 시작하기');\n  if (!btn || btn.disabled)\
      \ return { error: 'start btn not ready' };\n  btn.click();\n  return { clicked:\
      \ true };\n})()\n"
    wait_ms: 2500
    assert: result.clicked === true
  - step: fill_A1_and_verify
    tool: preview_eval
    expression: "(() => {\n  const i = document.querySelector('input[placeholder=\"\
      예: 홍길동\"]');\n  if (!i) return { error: 'A1 input not found' };\n  const setter\
      \ = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;\n\
      \  setter.call(i, '테스트학생');\n  i.dispatchEvent(new Event('input', { bubbles:\
      \ true }));\n  return { filled: i.value === '테스트학생', value: i.value };\n})()\n"
    assert: result.filled === true && result.value === '테스트학생'
