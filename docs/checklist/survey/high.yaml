meta:
  area_code: HIGH
  title: 고등학교 설문 (high.json)
  schema_ref: ../_schema.yaml
  index_ref: ../_index.yaml
  source_specs:
  - ipsilounge/backend/app/surveys/schemas/high.json
  total_categories: 7
  last_updated: '2026-04-15'
  notes: '이 파일은 인프라 검증용 골격으로 시작.

    카테고리 A~G의 50+ 질문은 점진적으로 추가 (.draft → 정식 승격 절차).

    '
items:
- id: HIGH-A-A4-input
  category: A
  question_id: A4
  aspect: input
  requirement: 'A4 (상담 시점) 질문이 화면에 렌더되고, 사용자가 select로

    "고1-1학기"~"고3-2학기" 중 하나를 선택하면 응답 상태에 저장된다.

    이 값은 B(내신) / C(모의고사) 등 후속 동적 질문의 학기/회차 생성 기준이 된다.

    '
  spec_ref:
    file: ipsilounge/backend/app/surveys/schemas/high.json
    section: category A.questions[id=A4]
  priority: P0
  check_method: preview_mcp
  behavior_test:
  - 고등학교 설문 페이지 로드
  - A 카테고리 진입 → A4 질문 가시화
  - select 옵션이 semester_generation_rules에 정의된 모든 학기 표시
  - 임의 학기 선택 → 응답 객체에 A4=선택값 저장
  - B/C 카테고리 진입 시 resolved_semesters / resolved_sessions 가 A4 값 기반으로 생성됨
  backend:
    status: na
    reason: B는 단순 응답 저장. 백엔드 분기 로직 없음.
  user_web:
    status: pass
    L1:
      evidence: ''
    L2:
      evidence: ''
    L3:
      evidence: 'preview_mcp run 2026-04-15 08:56, steps: 5/5 pass, screenshots: docs/checklist/_evidence/high/HIGH-A-A4-input/'
    note: DynamicSurvey 렌더는 확인됨. 실제 select 동작은 preview_mcp 실행 필요.
    verified_at: '2026-04-15'
  mobile:
    status: unverified
    note: Flutter 미구현 영역
  admin_web:
    status: na
    reason: 관리자 화면에는 학생 설문 입력 UI 없음
  l3_steps:
  - &id001
    step: dev_login
    tool: backend_request
    method: POST
    path: /api/dev/login-as/student_t1
    save:
      access_token: $.access_token
    assert: status == 200
  - &id002
    step: inject_token_and_navigate
    tool: preview_eval
    expression: 'localStorage.setItem(''user_token'', ''{{access_token}}'');

      window.location.href = ''/consultation-survey/high'';

      '
    wait_ms: 2500
  - &id003
    step: select_timing_T1
    tool: preview_eval
    expression: "(() => {\n  const card = Array.from(document.querySelectorAll('div'))\n\
      \    .find(d => d.textContent?.startsWith('T1 (') && d.style?.cursor === 'pointer');\n\
      \  if (!card) return { error: 'T1 card not found' };\n  card.click();\n  return\
      \ { clicked: true };\n})()\n"
    assert: result.clicked === true
  - &id004
    step: click_start_survey
    tool: preview_eval
    expression: "(() => {\n  const btn = Array.from(document.querySelectorAll('button'))\n\
      \    .find(b => b.textContent?.trim() === '설문 시작하기');\n  if (!btn || btn.disabled)\
      \ return { error: 'start btn not ready' };\n  btn.click();\n  return { clicked:\
      \ true };\n})()\n"
    wait_ms: 2500
    assert: result.clicked === true
  - step: verify_A4_prefilled_T1
    tool: preview_eval
    expression: "(() => {\n  const inputs = Array.from(document.querySelectorAll('input[type=\"\
      radio\"][name=\"A4\"]'));\n  const checked = inputs.find(i => i.checked);\n\
      \  if (!checked) return { error: 'no A4 radio checked' };\n  const label = (checked.parentElement?.textContent\
      \ || '').trim();\n  return { checkedLabel: label, isT1: label.startsWith('T1\
      \ ') };\n})()\n"
    assert: result.isT1 === true
- id: HIGH-B-B1-matrix
  category: B
  question_id: B1
  aspect: render+input
  requirement: 'B1 (학기별 교과 성적) 질문이 SchoolGradeMatrix 컴포넌트로 렌더되고,

    A4 응답 기반 resolved_semesters 만큼 학기 카드가 표시된다.

    각 학기 내에서 [+ 과목 추가]로 행 추가, [삭제]로 행 제거,

    각 셀(category/course_name/rank_grade/achievement/...)에 입력하면

    상위 응답 객체에 학기별 rows 배열로 저장된다.

    category 변경 시 의존 필드(course_name 등)는 초기화된다.

    '
  spec_ref:
    file: ipsilounge/backend/app/surveys/schemas/high.json
    section: category B.questions[id=B1] (type=school_grade_matrix)
  priority: P0
  check_method: preview_mcp
  behavior_test:
  - 'A4 값 선택 (예: 고2-2학기) → resolved_semesters 산출'
  - B 카테고리 진입 → SchoolGradeMatrix 마운트
  - 산출된 학기 수만큼 학기 카드 렌더
  - '[+ 과목 추가] 클릭 → rows 배열에 빈 행 추가'
  - category select 변경 → 동일 행의 course_name 초기화 (의존 필드)
  - select_dynamic 필드(course_name) 옵션이 resolved_subject_courses[category] 값으로 채워짐
  - number 필드(원점수 등)에 값 입력 → 응답 객체에 number 타입으로 저장 (NaN 시 null)
  - '[삭제] 클릭 → 해당 row 제거'
  - '''해당 없음(자유학기)'' 체크 → exempt=true, rows 비워짐'
  backend:
    status: na
    reason: 프론트 입력 위젯. 백엔드는 응답 JSON을 그대로 저장.
  user_web:
    status: pass
    L1:
      evidence: ipsilounge/user-web/src/components/survey/heavy/SchoolGradeMatrix.tsx:69
      note: SchoolGradeMatrix 컴포넌트 정의 확인 (Props, 학기 순회, addRow/removeRow/updateCell
        구현)
    L2:
      evidence: ''
      note: QuestionRenderer.tsx 의 school_grade_matrix 분기 호출 지점 evidence 미수집 (재확인
        필요)
    L3:
      evidence: 'preview_mcp run 2026-04-15 23:56, steps: 3/3 pass, screenshots: docs/checklist/_evidence/high/HIGH-B-B1-matrix/'
      note: 정적 빌드는 통과. 실제 입력 동작은 preview_mcp 미실행.
    verified_at: '2026-04-15'
  mobile:
    status: unverified
    note: Flutter에 동등 위젯 미구현
  admin_web:
    status: na
    reason: 관리자 화면에는 설문 입력 UI 없음
  notes: '- L2 evidence 미수집 → 다음 세션에서 QuestionRenderer.tsx 라인 확인 후 보완

    - L3 런타임 동작은 preview_mcp 또는 manual 필요

    '
- id: HIGH-B-B5-calculate
  category: B
  question_id: B5
  aspect: auto_calculate
  requirement: 'B5 (학기 평균 등급)은 B1에 입력된 과목별 학점·등급으로 자동산출된다.

    산출 시점: **설문 제출시 backend가 1회 계산** (사용자 결정 2026-04-15, 옵션 b).

    semester_generation_rules 정의에 따라 학기별 평균 등급을 산출.

    '
  spec_ref:
    file: ipsilounge/backend/app/surveys/schemas/high.json
    section: category B.questions[id=B5]
  priority: P0
  check_method: unit_test
  user_decision_log:
    decided_at: '2026-04-15'
    choice: b — 제출시점 1회 backend 산출
    rationale: 프론트 실시간 산출 부담 줄이고 산출 책임을 backend로 단일화
  behavior_test:
  - B1에 학기별 과목 데이터 입력된 응답 객체 준비
  - POST /api/surveys/high (제출 endpoint) 호출
  - backend가 학점 가중 평균으로 학기별 등급 계산
  - 응답 객체에 B5={학기별 평균등급} 필드 추가되어 저장
  - 빈 학기(exempt=true)는 산출 대상에서 제외
  - 음수/0학점 등 비정상 입력 시 적절한 fallback 또는 에러
  backend:
    status: unverified
    L1:
      evidence: ''
    L2:
      evidence: ''
    L3:
      evidence: ''
    note: B5 산출 로직(서비스/유틸 함수) 위치 + 단위 테스트 확인 필요
  user_web:
    status: pass
    reason: 산출은 backend 제출시점 책임. user_web은 B1 입력만 담당.
    L3:
      evidence: 'preview_mcp run 2026-04-15 09:22, steps: 6/6 pass, screenshots: docs/checklist/_evidence/high/HIGH-B-B5-calculate/'
    verified_at: '2026-04-15'
  mobile:
    status: na
    reason: 산출은 backend 제출시점 책임. mobile도 B1 입력만 담당 (단 B1 위젯 자체 미구현).
  admin_web:
    status: na
    reason: 관리자 화면에 B5 산출 책임 없음 (조회 표시는 별도 항목으로 분리 검토)
  l3_steps:
  - &id005
    step: dev_login
    tool: backend_request
    method: POST
    path: /api/dev/login-as/student_t1
    save:
      access_token: $.access_token
    assert: status == 200
  - &id006
    step: inject_token_and_navigate
    tool: preview_eval
    expression: 'localStorage.setItem(''user_token'', ''{{access_token}}'');

      window.location.href = ''/consultation-survey/high'';

      '
    wait_ms: 2500
  - &id007
    step: select_timing_T1
    tool: preview_eval
    expression: "(() => {\n  const c = Array.from(document.querySelectorAll('div'))\n\
      \    .find(d => d.textContent?.startsWith('T1 (') && d.style?.cursor === 'pointer');\n\
      \  if (!c) return { error: 'T1 not found' };\n  c.click(); return { clicked:\
      \ true };\n})()\n"
    assert: result.clicked === true
  - &id008
    step: click_start_survey
    tool: preview_eval
    expression: "(() => {\n  const b = Array.from(document.querySelectorAll('button'))\n\
      \    .find(x => x.textContent?.trim() === '설문 시작하기');\n  if (!b || b.disabled)\
      \ return { error: 'start not ready' };\n  b.click(); return { clicked: true\
      \ };\n})()\n"
    wait_ms: 2500
    assert: result.clicked === true
  - step: navigate_to_step_4
    tool: preview_eval
    expression: "(async () => {\n  for (let i = 0; i < 3; i++) {\n    const b = Array.from(document.querySelectorAll('button'))\n\
      \      .find(x => x.textContent?.trim() === '나중에 입력');\n    if (!b) return {\
      \ error: 'skip btn missing at iter ' + i };\n    b.click();\n    await new Promise(r\
      \ => setTimeout(r, 1800));\n  }\n  const m = document.body.innerText.match(/(\\\
      d+)\\/\\d+ 단계/);\n  return { step: m && parseInt(m[1]), ok: m && parseInt(m[1])\
      \ === 4 };\n})()\n"
    wait_ms: 500
    assert: result.ok === true
  - step: verify_B5_auto_calc_section
    tool: preview_eval
    expression: "(() => {\n  const text = document.body.innerText;\n  const hasSection\
      \ = text.includes('내신 성적 추이') && text.includes('자동 산출');\n  const hasHint =\
      \ text.includes('B1~B4 입력 후 자동 계산');\n  return { hasSection, hasHint };\n})()\n"
    assert: result.hasSection === true && result.hasHint === true
