# ─── C. 스키마 일관성 ───────────────────────────────────────────────
  - id: DS-C1-course-req-single-sheet
    requirement: |
      course_requirements.xlsx 단일 시트 "권장과목" 구조
      - 5개 열: 대학 | 모집단위 | 핵심과목 | 권장과목 | 비고
      - 핵심/권장 과목은 쉼표 구분
      - ※ 로 시작하는 행은 주석 처리 (양쪽 로더에서 skip)
      - 헤더 행 1, 데이터 행 2~
    spec_ref: "ipsilounge/analyzer/CLAUDE.md L421~434 (교과 이수 기준표 스키마)"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        backend course_requirement_service.py L33~36 _SHEET_NAME="권장과목",
        L80~105 min_row=2 순회, 5개 열 추출, ※ 주석 행 skip 로직 구현.
        analyzer grade_analyzer.py L358 sheet_name='권장과목' if '권장과목' in wb.sheetnames else wb.sheetnames[0].
        양쪽 동일 스키마 해석.

  - id: DS-C2-course-req-loader-symmetry
    requirement: |
      양쪽 로더가 동일 파일을 동일하게 해석
      - course_requirement_service._load_db() (ipsilounge)
      - grade_analyzer.load_course_requirements() (analyzer)
      - 헤더 명시 주석으로 공유 관계 문서화
    spec_ref: "course_requirement_service.py L15~17 주석 + grade_analyzer.py L309"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        course_requirement_service.py L15~17 헤더 주석: "analyzer 와
        동일 파일을 공유하며, ipsilounge/analyzer/modules/grade_analyzer.py 의
        load_course_requirements() 도 이 스키마를 기준으로 동작한다."
        grade_analyzer.py L309 주석: "analyzer 와 ipsilounge 가 동일 파일 공유".
        양쪽에 대칭 주석 존재.

  - id: DS-C3-admission-db-sheets
    requirement: |
      admission_db.xlsx 시트 구조
      - 수시입결RAW: 수시 입결 원본 (counselor_type_service _load_susi_from_excel)
      - 정시입결RAW: 정시 입결 원본 (counselor_type_service _load_jeongsi_from_excel)
      - min_row 수시=5, 정시=8 (상단 헤더 구조 다름)
    spec_ref: "counselor_type_service.py L114, L185"
    priority: P1
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        counselor_type_service.py L114 "수시입결RAW" 시트명 확인 + L185 "정시입결RAW" 시트명 확인.
        L120 min_row=5, L191 min_row=8 로 각 시트의 헤더 구조 반영.
        시트 미존재 시 wb.close() + [] 반환 (graceful degradation).

  - id: DS-C4-suneung-column-layout
    requirement: |
      수능최저_db.xlsx 컬럼 구조 (min_row=4, max_col=19)
      - A=구분, E=수준, F=일반/지역, H=대학, I=학년도
      - J=전형구분, K=전형명, L=계열, M=모집구분
      - N=수능최저(핵심 요구조건), O=수학, P=탐구, R=비고
      - N 컬럼이 빈 값 또는 "-" 인 행은 skip
    spec_ref: "suneung_minimum_service.py L36~60"
    priority: P1
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        suneung_minimum_service.py L38 min_row=4 max_col=19 설정.
        L40~59 13개 컬럼 인덱스 매핑 전부 확인. L41~43 N 컬럼("-"/빈값) skip 로직 존재.
        _parse_requirement_text() 에서 복합조건 블록 분리까지 구현.

# ─── D. 백엔드 서비스 연계 ──────────────────────────────────────────
  - id: DS-D1-course-requirement-service
    requirement: |
      course_requirement_service._DB_PATH = settings.DATA_ROOT / "course_requirements.xlsx"
      - 모듈 로드 시점에 경로 확정
      - _load_db() 캐싱 (_DB_CACHE 전역)
      - 파일 미존재 시 logger.warning + 빈 리스트 반환 (graceful)
      - reset_cache() 으로 갱신 후 재로딩 가능
    spec_ref: "course_requirement_service.py L35, L61~109, L112~115"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        L35 _DB_PATH 정의. L41 _DB_CACHE 전역 캐시.
        L63~65 캐시 히트 시 즉시 반환. L67~70 파일 미존재 시 warning+빈리스트.
        L112~115 reset_cache() 전역 캐시 None 리셋.

  - id: DS-D2-suneung-service
    requirement: |
      suneung_minimum_service._DB_PATH = settings.DATA_ROOT / "수능최저_db.xlsx"
      - _load_db() 캐싱 (_DB_CACHE 전역)
      - 파일 미존재 시 FileNotFoundError 발생 (엄격 모드)
      - 한글 파일명 Path 조합 정상
    spec_ref: "suneung_minimum_service.py L20~21, L24~64"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        L20 _DB_CACHE + L21 _DB_PATH 정의. L27~28 캐시 히트 시 즉시 반환.
        L30~31 파일 미존재 시 FileNotFoundError (엄격) — 수능최저는 필수 파일이라
        course_requirements 와 달리 에러로 실패시키는 전략.

  - id: DS-D3-counselor-service
    requirement: |
      counselor_type_service._get_admission_db_path()
      - 1순위: ADMISSION_DB_PATH 환경변수 (os.environ + os.path.exists)
      - 2순위: settings.DATA_ROOT / "admission_db.xlsx"
      - 둘 다 실패 시 빈 문자열 반환 (graceful)
      - _load_susi_from_excel / _load_jeongsi_from_excel 가 이 경로를 사용
    spec_ref: "counselor_type_service.py L57~69"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        L60~62 env_path 체크 + os.path.exists 검증. L64~67 shared 경로 fallback.
        L69 빈 문자열 반환. _load_susi_from_excel L109~111, _load_jeongsi_from_excel L181~182
        에서 path 빈 값 시 [] 반환 (graceful).

# ─── E. 폴백/오버라이드 전략 ────────────────────────────────────────
  - id: DS-E1-admission-db-env-override
    requirement: |
      ADMISSION_DB_PATH 환경변수로 admission_db.xlsx 단일 파일 오버라이드
      - SHARED_DATA_ROOT 전체 재지정 없이 admission_db 만 다른 경로 사용 가능
      - 테스트 환경에서 mock 데이터 파일 주입 시 유용
    spec_ref: "counselor_type_service.py L60~62"
    priority: P1
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        L60 os.environ.get("ADMISSION_DB_PATH") + L61 os.path.exists 이중 검증.
        파일 실재성까지 확인 후 경로 반환 (환경변수만 설정되고 파일이 없으면
        2순위 shared 경로로 자동 폴백).

  - id: DS-E2-db-first-excel-fallback
    requirement: |
      입결 데이터는 DB 우선 + Excel 폴백 이중 전략
      - _load_susi_db / _load_jeongsi_db: try DB → except → Excel
      - PostgreSQL admission_data / jeongsi_admission_data 테이블 우선 조회
      - DB 쿼리 실패 또는 결과 0건 시 Excel 파일 로드
      - @functools.lru_cache(maxsize=1) 로 프로세스 수명 캐시
    spec_ref: "counselor_type_service.py L72~85, L137~150"
    priority: P1
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        _load_susi_db L72~85 try/except + Excel fallback. _load_jeongsi_db L137~150 동일 패턴.
        L72, L137 @functools.lru_cache(maxsize=1) 프로세스 캐시.
        DB 로드 성공 시 logger.info "PostgreSQL" 태그, Excel 폴백 시 logger.info "Excel" 태그로 구분.

  - id: DS-E3-graceful-degradation
    requirement: |
      공유 파일 미존재 시 서비스별 처리 전략
      - course_requirement_service: warning log + 빈 결과 ("available": False 응답)
      - counselor_type_service: 빈 문자열 path → 빈 records → 판정 불가 처리
      - suneung_minimum_service: FileNotFoundError raise (엄격)
      서비스 특성에 맞게 엄격 vs 관대 전략 분기
    spec_ref: "각 서비스 파일 미존재 처리 지점"
    priority: P1
    code_review:
      status: pass
