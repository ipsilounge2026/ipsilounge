# ===================================================================
# 분석기↔서비스 데이터 공유 (SHARED_DATA_ROOT) 체크리스트
# ===================================================================
# 영역: cross-cutting / DATA_SHARE
# spec:
#   - ipsilounge/analyzer/CLAUDE.md § 교과 이수 기준표 — 공유 원칙
#   - ipsilounge/backend/app/config.py (SHARED_DATA_ROOT + DATA_ROOT property)
#   - ipsilounge/backend/app/services/course_requirement_service.py
#   - ipsilounge/backend/app/services/suneung_minimum_service.py
#   - ipsilounge/backend/app/services/counselor_type_service.py
#   - ipsilounge/analyzer/modules/grade_analyzer.py (load_course_requirements)
#   - ipsilounge/analyzer/modules/admission_matcher.py
#
# 공유 대상 파일 (ipsilounge/analyzer/data/):
#   1. course_requirements.xlsx  — 권장과목 DB (ipsilounge + analyzer 동시 참조)
#   2. admission_db.xlsx         — 수시/정시 입결 DB (counselor_type_service + analyzer)
#   3. 수능최저_db.xlsx           — 수능 최저 기준 DB (suneung_minimum_service)
#   4. university_grading.xlsx   — 대학별 내신 산출 DB (analyzer 전용, 공유 인프라)
#
# 검증 방법: 코드 리뷰 + 파일 실존 확인 + 경로 계산 검증
#   - _DEFAULT_DATA_ROOT 의 parents[3] 경로 계산이 실제 존재 경로와 일치하는지 확인
#   - 4개 XLSX 파일의 스키마가 양쪽 로더에서 동일하게 해석되는지 확인
# ===================================================================

meta:
  area_code: DATA_SHARE
  title: "분석기↔서비스 데이터 공유 (SHARED_DATA_ROOT)"
  created_at: "2026-04-16"
  spec_refs:
    - "ipsilounge/analyzer/CLAUDE.md § 교과 이수 기준표 — 공유 원칙"
    - "ipsilounge/backend/app/config.py"
    - "ipsilounge/backend/app/services/course_requirement_service.py"
    - "ipsilounge/backend/app/services/suneung_minimum_service.py"
    - "ipsilounge/backend/app/services/counselor_type_service.py"
    - "ipsilounge/analyzer/modules/grade_analyzer.py"
    - "ipsilounge/analyzer/modules/admission_matcher.py"
  implementation_notes:
    - "공유 원칙: ipsilounge/analyzer/data 가 단일 원천(single source of truth). ipsilounge 백엔드가 환경변수 SHARED_DATA_ROOT 또는 자동 기본값으로 동일 파일 참조"
    - "기본 경로: ipsilounge/backend/app/config.py → parents[3]/ipsilounge/analyzer/data. 즉 config.py(깊이 0) → app(1) → backend(2) → ipsilounge(3) → (parent) → ipsilounge/analyzer/data"
    - "운영(EC2) 배포 시 SHARED_DATA_ROOT 환경변수로 재지정 필요 — 이 부분은 배포 가이드(docs/deployment.md) 과제로 분리"
    - "admission_db.xlsx 는 ADMISSION_DB_PATH 환경변수 단일 파일 오버라이드도 지원. DB 우선 + Excel 폴백 이중 전략"
    - "course_requirements.xlsx 는 2026-04 스키마 정규화 완료: 단일 시트 '권장과목', Wide + 쉼표구분. 양쪽 로더 동일 해석"

# ─── A. SHARED_DATA_ROOT 설정 ──────────────────────────────────────
items:
  - id: DS-A1-default-path
    requirement: |
      ipsilounge/backend/app/config.py
      - _DEFAULT_DATA_ROOT = Path(__file__).resolve().parents[3] / "analyzer" / "data"
      - 경로 계산: config.py → app → backend → ipsilounge → (parent) → ipsilounge/analyzer/data
      - 실행 시점에 절대경로로 해석 (resolve())
    spec_ref: "backend/app/config.py L10~12"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        config.py L10~12 _DEFAULT_DATA_ROOT 정의 확인. parents[3] 계산이
        C:\...\ipsilounge\backend\app\config.py 에서 C:\...\ (학생부분석프로그램)
        으로 올라간 뒤 ipsilounge/analyzer/data 로 합류됨.
        실제 파일 시스템에 동일 경로 존재 (ls 로 확인).

  - id: DS-A2-env-override
    requirement: |
      Settings.SHARED_DATA_ROOT: str = str(_DEFAULT_DATA_ROOT)
      - pydantic_settings BaseSettings 로 .env 파일에서 재정의 가능
      - model_config = {"env_file": ".env", "extra": "ignore"}
      - 운영 배포 시 SHARED_DATA_ROOT=/path/to/data 로 주입
    spec_ref: "backend/app/config.py L78, L80"
    priority: P1
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        L78 SHARED_DATA_ROOT 클래스 변수 선언 + 기본값 _DEFAULT_DATA_ROOT 할당.
        L80 model_config env_file=".env" 지정. pydantic BaseSettings 패턴으로
        환경변수 또는 .env 파일을 통해 재정의 가능.

  - id: DS-A3-data-root-property
    requirement: |
      @property DATA_ROOT(self) -> Path:
          return Path(self.SHARED_DATA_ROOT)
      - 모든 서비스는 settings.DATA_ROOT 를 통해 공용 루트 참조
      - str → Path 변환은 이 한 지점에서만 수행
    spec_ref: "backend/app/config.py L82~84"
    priority: P0
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        L82~84 @property DATA_ROOT 정의 확인. 3개 서비스(course_requirement_service,
        suneung_minimum_service, counselor_type_service) 모두 settings.DATA_ROOT
        속성만 사용하여 일관성 유지.

  - id: DS-A4-single-source-doc
    requirement: |
      ipsilounge/analyzer/CLAUDE.md § 교과 이수 기준표 — 공유 원칙
      - "이 파일은 ipsilounge/analyzer/data/ 가 단일 원천(single source of truth)"
      - "입시라운지 백엔드(ipsilounge/backend)는 환경변수 SHARED_DATA_ROOT 또는
         자동 계산된 기본값을 통해 동일한 파일을 참조함"
      - "매년 대학 발표를 한 곳에서만 갱신하면 두 시스템 모두 반영됨"
    spec_ref: "ipsilounge/analyzer/CLAUDE.md L447~453 (공유 원칙 3줄 요약)"
    priority: P1
    code_review:
      status: pass
      verified_at: "2026-04-16"
      evidence: |
        CLAUDE.md 공유 원칙 섹션에 3가지 원칙 모두 명시:
        (1) 단일 원천, (2) 백엔드 재참조, (3) 단일 갱신 → 양쪽 반영.
        이 원칙이 코드(_DEFAULT_DATA_ROOT 자동 계산 + ADMISSION_DB_PATH 오버라이드)
        에 그대로 구현됨.

