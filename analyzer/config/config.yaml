# 학생부 분석 프로그램 설정

scoring:
  # 세특 평가 가중치 (7항목, 총 100%)
  setuek_weights:
    교과연계성: 0.17
    탐구동기: 0.17
    탐구과정: 0.17
    결과성찰: 0.17
    전공적합성: 0.10
    차별성: 0.07
    학업태도: 0.15

  # 전공적합성 제외 시 가중치 재배분
  setuek_weights_no_major:
    교과연계성: 0.19
    탐구동기: 0.19
    탐구과정: 0.19
    결과성찰: 0.19
    차별성: 0.08
    학업태도: 0.16

  # 창체 영역별 가중치
  changche_weights:
    자율: 0.333
    동아리: 0.333
    진로: 0.334

  # 종합 경쟁력 가중치
  overall_weights:
    내신: 0.30
    세특: 0.30
    창체: 0.25
    행특: 0.10
    출결: 0.05

  # 소인수 과목 기준 (수강자수)
  small_class_threshold: 13

# 종합 등급 기준 (100점 만점)
# ※ [DEAD CONFIG - 2026-04-17] 현재 코드에서 이 섹션을 읽지 않음.
#   report_logic.py / qa_validator.py 는 동일 기준을 하드코딩으로 사용 중.
#   향후 "config 참조 전환" 리팩터 시 활성화 예정. 값은 하드코딩과 일치시켜 둠.
grades:
  S: { min: 90, max: 100, label: "최상위권 학종 경쟁력" }
  A: { min: 75, max: 89, label: "상위권" }
  B: { min: 55, max: 74, label: "평균 수준" }
  C: { min: 35, max: 54, label: "보완 필요" }
  D: { min: 0, max: 34, label: "경쟁력 재고 필요" }

# 세특/창체/행특 등급 기준 (10점 만점 가중평균)
# ※ [DEAD CONFIG - 2026-04-17] 현재 코드에서 이 섹션을 읽지 않음.
#   modules/report_logic.py score_to_grade() 하드코딩과 값만 동일하게 유지.
#   향후 "config 참조 전환" 리팩터 시 활성화 예정.
rubric_grades:
  S: { min: 8.5, max: 10.0 }
  A: { min: 7.0, max: 8.4 }
  B: { min: 5.0, max: 6.9 }
  C: { min: 3.5, max: 4.9 }
  D: { min: 1.0, max: 3.4 }

# 창체 분량 비율 분석 기준
changche_volume:
  limits:
    자율: 500
    동아리: 500
    진로: 700
  thresholds:
    충실활용: 0.95    # 95% 이상
    활용부족: 0.80    # 80% 미만

# 워드클라우드 설정
# ※ [DEAD CONFIG - 2026-04-17] CLAUDE.md § Step 8-4 워드클라우드 기능은 현재 미구현.
#   본 섹션은 향후 wordcloud + 형태소 분석(konlpy/kiwipiepy) 파이프라인 도입 시 활성화 예정.
#   현재 report_logic.py 는 이 섹션을 읽지 않음.
# TODO: 키워드분석 시트 + 워드클라우드 PNG 삽입 구현 시 재활용.
wordcloud:
  max_keywords: 50
  min_frequency: 2
  font_path: "NanumGothic.ttf"
  width: 800
  height: 400

# 역량별 보완법 기준 (10점 만점, 이 점수 이하면 보완 대상)
# ※ CLAUDE.md § Step 8-7 "점수가 6점 이하인 경우 보완 대상" 기준
# ※ [DEAD CONFIG - 2026-04-17] 현재 코드는 fix_data 를 학생 파일에서 바로 읽음.
#   향후 자동 보완법 생성 파이프라인 도입 시 이 값 참조 예정.
remedial_threshold: 6.0

# 5등급→9등급 환산표 출처 시트명
grade_conversion_source: "부산광역시교육청"

# 성적 추이 패턴 판별 임계값 (등급 차이)
trend_threshold: 0.3

# 주요교과 교과군 목록
major_subject_groups:
  공통: ["국어", "수학", "영어"]
  인문: ["국어", "수학", "영어", "사회", "한국사"]
  자연: ["국어", "수학", "영어", "과학"]

# 진로선택과목 성취도 → 등급 환산
jinro_grade_map:
  A: 1
  B: 2
  C: 3
  D: 4
  E: 5

# 출결 감점 기준 (100점 만점)
attendance_scoring:
  base: 100
  미인정결석_per_day: -5
  질병결석_per_day: -1
  지각_per_count: -0.5
  조퇴_per_count: -0.5
  결과_per_count: -0.5
  min_score: 0
