# ═════════════════════════════════════════════════════════════
# 설정
# ═════════════════════════════════════════════════════════════
settings:
  # 우선순위 (높은 카테고리에 먼저 매칭. 동일 키워드 중복 시 상위 우선)
  priority_order:
    - 학업역량
    - 진로역량
    - 공동체역량
    - 일반

  # 매칭 모드
  # - "exact": 정확히 일치
  # - "contains": 키워드를 포함하면 매칭 (예: "탐구" 는 "탐구활동" 에도 매칭)
  match_mode: "contains"

  # 미분류 키워드 처리
  # - "skip": 제외 (상위 카테고리 매칭 안 되면 키워드 리스트에서 제거)
  # - "general": "일반" 카테고리로 분류
  unmatched_policy: "general"
