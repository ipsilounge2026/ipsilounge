# 용도: modules/keyword_extractor.py 가 형태소 분석으로 추출한
#       키워드를 4개 카테고리로 분류할 때 참조하는 사전.
#
# 매칭 규칙: 완전 일치 + 부분 포함 (예: "탐구" 가 "탐구활동", "탐구심" 에도 매칭)
