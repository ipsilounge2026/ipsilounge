worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;   # 학생부 파일 업로드 허용 크기

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name api.ipsilounge.co.kr;

        # Certbot 인증 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS API 서버
    server {
        listen 443 ssl http2;
        server_name api.ipsilounge.co.kr;

        ssl_certificate     /etc/nginx/ssl/live/api.ipsilounge.co.kr/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/api.ipsilounge.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 보안 헤더
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 파일 업로드 타임아웃
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
        }
    }
}
