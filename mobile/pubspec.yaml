name: ipsilounge
description: 입시라운지 - 학생부 분석 & 상담 예약 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP 통신
  http: ^1.2.0

  # 로컬 저장소 (토큰 저장)
  shared_preferences: ^2.2.2

  # 파일 선택
  file_picker: ^8.0.3

  # 파일 열기/다운로드
  open_filex: ^4.3.4
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # FCM 푸시 알림
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2

  # 상태 관리
  provider: ^6.1.2

  # URL 실행 (외부 브라우저)
  url_launcher: ^6.2.5

  # Google Play 인앱결제
  in_app_purchase: ^3.2.0

  # 날짜 포맷
  intl: ^0.19.0

  # 아이콘
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
