name: Build Android APK

on:
  workflow_dispatch:  # 수동 트리거
  push:
    paths:
      - 'mobile/**'
      - 'user-web/**'
      - 'backend/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      # GOOGLE_SERVICES_JSON_BASE64 secret 이 등록돼 있으면 google-services.json 복원.
      # 미등록 시 그냥 스킵 — build.gradle 의 if(file().exists()) 조건이 google-services
      # 플러그인 적용을 자동 건너뛰어 빌드는 성공하지만 런타임 Firebase 는 비활성.
      - name: Restore google-services.json (Firebase 활성용)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 secret 미등록 — Firebase 비활성 빌드로 진행"
            exit 0
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          echo "✅ google-services.json 복원 완료 ($(wc -c < android/app/google-services.json) bytes)"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ipsilounge-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ipsilounge-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
