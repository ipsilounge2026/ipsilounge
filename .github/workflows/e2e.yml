name: E2E Tests (Playwright)

# 트리거:
#   - backend / user-web / e2e 폴더 또는 본 워크플로우 자체 변경 시
#   - main 브랜치 push + PR
#   - 수동 실행(workflow_dispatch)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "user-web/**"
      - "admin-web/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "user-web/**"
      - "admin-web/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"

# 동일 ref (브랜치/PR) 에서 새 푸시 시 이전 실행 취소
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (Sprint 1)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # backend DEV_MODE (SQLite) 로 실행 — 운영 DB 영향 없음
      CI: "true"
      PYTHONIOENCODING: "utf-8"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            user-web/package-lock.json
            admin-web/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install user-web dependencies
        working-directory: user-web
        run: npm ci

      - name: Install admin-web dependencies
        working-directory: admin-web
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      # Playwright 브라우저 캐시 — package-lock.json 변경 시 자동 무효화
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright Chromium + OS deps
        working-directory: e2e
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # 캐시 히트 시에도 OS-level 라이브러리는 이미지 리셋으로 없어질 수 있으므로 재설치
      - name: Install Playwright OS deps (cache hit)
        working-directory: e2e
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        # reporter(list/html/junit) 는 playwright.config.ts 에 이미 설정되어 있음
        run: npx playwright test

      # 실패 시 아티팩트 업로드 (브라우저 trace / 스크린샷 / 비디오)
      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test result artifacts (screenshots, videos, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 7
          if-no-files-found: ignore

      # 성공 시에도 JUnit XML 은 유지 (테스트 히스토리 추적용)
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: e2e/test-results/junit.xml
          retention-days: 30
          if-no-files-found: ignore
